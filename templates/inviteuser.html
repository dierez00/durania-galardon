<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Invitacion 8A</title>
	</head>
	<body style="margin: 0; padding: 0; background-color: #f9fafc; font-family: Arial, Helvetica, sans-serif; color: #1a222f;">
		<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color: #f9fafc; margin: 0; padding: 24px 12px;">
			<tr>
				<td align="center">
					<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width: 600px; background-color: #fefeff; border: 1px solid #dbe7e8; border-radius: 14px; overflow: hidden;">
						<tr>
							<td align="center" style="padding: 28px 24px 8px 24px;">
								<img src="{{ .SiteURL }}/logos/logo8a_verde.png" alt="8A" width="120" style="display: block; width: 120px; max-width: 120px; height: auto; border: 0; outline: none; text-decoration: none;" />
							</td>
						</tr>
						<tr>
							<td style="padding: 8px 24px 8px 24px; text-align: center;">
								<h1 style="margin: 0; font-size: 28px; line-height: 1.2; color: #065758; font-weight: 700;">Te damos la bienvenida a 8A</h1>
							</td>
						</tr>
						<tr>
							<td style="padding: 8px 24px 0 24px; text-align: center;">
								<p style="margin: 0; font-size: 16px; line-height: 1.6; color: #1a222f;">Has sido invitado a crear tu acceso en 8A.</p>
							</td>
						</tr>
						<tr>
							<td align="center" style="padding: 24px 24px 10px 24px;">
								<a href="{{ .RedirectTo }}?token_hash={{ .TokenHash }}&type=invite" style="display: inline-block; padding: 12px 24px; border-radius: 10px; background-color: #065758; color: #fefeff; font-size: 16px; font-weight: 700; text-decoration: none;">Aceptar invitacion</a>
							</td>
						</tr>
						<tr>
							<td style="padding: 4px 24px 24px 24px; text-align: center;">
								<p style="margin: 0; font-size: 13px; line-height: 1.5; color: #4b5563;">Si no esperabas este correo, puedes ignorarlo con seguridad.</p>
							</td>
						</tr>
					</table>
				</td>
			</tr>
		</table>
	</body>
</html>
